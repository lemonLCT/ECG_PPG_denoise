runtime:
  experiment_name: modality_flexible_diffusion
  seed: 42
  device: cuda
  use_amp: true

data:
  num_workers: 0
  val_ratio: 0.1
  window_length: 512
  window_stride: 256
  synthetic_num_samples: 1024

path:
  dataset_path: ""
  checkpoint_path: ""
  infer_input_path: ""
  eval_input_path: ""
  train_output_dir: artifacts/runs/normal_train
  infer_output_path: artifacts/infer/denoised_result.npz
  eval_output_dir: artifacts/eval

loss:
  diffusion_weight: 1.0
  derivative_weight: 0.0

model:
  selected: modality_flexible_conditional_diffusion
  variants:
    modality_flexible_conditional_diffusion:
      signal_length: 512
      cond_channels: 96
      joint_channels: 256
      base_channels: 64
      gn_groups: 8
      diffusion_steps: 200
      beta_start: 0.0001
      beta_end: 0.02
      ecg_encoder:
        input_channels: 1
        branch_channels: 16
        kernel_sizes: [1, 3, 5, 7, 9, 11]
        output_channels: 96
        use_projection: false
      ppg_encoder:
        input_channels: 1
        branch_channels: 16
        kernel_sizes: [1, 3, 5, 7, 9, 11]
        output_channels: 96
        use_projection: false
      quality_assessor:
        hidden_channels: 64
        output_channels: 1
    modality_flexible_conditional_diffusion_debug:
      signal_length: 512
      cond_channels: 96
      joint_channels: 128
      base_channels: 32
      gn_groups: 8
      diffusion_steps: 50
      beta_start: 0.0001
      beta_end: 0.02
      ecg_encoder:
        input_channels: 1
        branch_channels: 16
        kernel_sizes: [1, 3, 5, 7, 9, 11]
        output_channels: 96
        use_projection: false
      ppg_encoder:
        input_channels: 1
        branch_channels: 16
        kernel_sizes: [1, 3, 5, 7, 9, 11]
        output_channels: 96
        use_projection: false
      quality_assessor:
        hidden_channels: 48
        output_channels: 1

train:
  selected_stage: ecg_pretrain
  common:
    batch_size: 32
    val_batch_size: 32
    weight_decay: 0.0001
    grad_clip: 1.0
    log_interval: 20
    save_every_epochs: 1
  stages:
    ecg_pretrain:
      epochs: 50
      lr: 0.0001
      max_steps_per_epoch: 2000
      modality_dropout: 0.0
    ppg_pretrain:
      epochs: 50
      lr: 0.0001
      max_steps_per_epoch: 2000
      modality_dropout: 0.0
    joint:
      epochs: 80
      lr: 0.0001
      max_steps_per_epoch: 2500
      modality_dropout: 0.1

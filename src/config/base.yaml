runtime:
  experiment_name: multimodal_diffusion
  seed: 42
  device: cpu
  use_amp: true

data:
  num_workers: 0
  val_ratio: 0.1
  window_length: 500
  window_stride: 256
  synthetic_num_samples: 1024

path:
  dataset_path: ""
  checkpoint_path: ""
  infer_input_path: ""
  eval_input_path: ""
  train_output_dir: artifacts/runs/train
  infer_output_path: artifacts/infer/denoised_result.npz
  eval_output_dir: artifacts/eval

loss:
  diffusion_weight: 1.0
  derivative_weight: 0.0

model:
  main_model:
    signal_length: 512
  ecg_encoder:
    input_channels: 1
    branch_channels: 16
    kernel_sizes: [1, 3, 5, 7, 9, 11]
    output_channels: 96
    use_projection: false
    gn_groups: 8
  ppg_encoder:
    input_channels: 1
    branch_channels: 16
    kernel_sizes: [1, 3, 5, 7, 9, 11]
    output_channels: 96
    use_projection: false
    gn_groups: 8
  conditional_model:
    cond_channels: 96
    joint_channels: 256
    base_channels: 64
    gn_groups: 8
  diffusion:
    num_steps: 200
    beta_start: 0.0001
    beta_end: 0.02

train:
  stage_name: joint
  batch_size: 16
  val_batch_size: 16
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  save_every_epochs: 50
  max_steps_per_epoch: 5000
  modality_dropout: 0.1

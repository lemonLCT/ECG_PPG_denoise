runtime:
  experiment_name: multimodal_diffusion
  seed: 42
  device: cpu
  use_amp: true

data:
  num_workers: 0
  val_ratio: 0.3
  window_length: 500
  window_stride: 250
  synthetic_num_samples: 1024

path:
  dataset_path: ""
  qt_root: "D:/Code/data/db/QTDB"
  ppg_fieldstudy_pickle_path: "D:/Code/data/PPG_FieldStudy/S1/S1.pkl"
  artifact_param_path: "D:/Code/data/数据处理脚本/artifact_param.mat"
  checkpoint_path: ""
  infer_input_path: ""
  eval_input_path: ""
  train_output_dir: artifacts/runs/train
  infer_output_path: artifacts/infer/denoised_result.npz
  eval_output_dir: artifacts/eval

bidmc:
  path:
    bidmc_root: "D:/Code/data/bidmc-ppg-and-respiration-dataset-1.0.0"
    nstdb_root: "D:/Code/data/db/QTDB/mit-bih-noise-stress-test-database-1.0.0"
  data:
    window_length: 500
    window_stride: 250
    sampling_rate_hz: 125.0
    split_seed: 42
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    normalization: window_minmax
    ecg_channel_name: II
    ecg_channel_fallback_names: [ECG, MLII]
    ppg_channel_name: PLETH
    ppg_channel_fallback_names: [PPG]
    ecg_noise_version: 1
    ecg_noise_ratio_range: [0.2, 2.0]
    bidmc_ppg_noise_seed: 2024
    ppg_noise_ratio_range: [0.2, 2.0]
    ppg_noise_artifact_param_path: ""
    ppg_noise_artifact_types: [1, 1, 1, 1]
    ppg_noise_dur_mu: [10.0, 10.0, 10.0, 10.0, 10.0]
    ppg_noise_rms_shape: [2.0, 2.0, 2.0, 2.0]
    ppg_noise_rms_scale: [0.35, 0.45, 0.55, 0.75]
    ppg_noise_slope_mean: [-6.0, -8.0, -10.0, -12.0]
    ppg_noise_slope_std: [0.0, 0.0, 0.0, 0.0]

loss:
  diffusion_weight: 1.0
  derivative_weight: 0.0

model:
  main_model:
    signal_length: 512
  ecg_encoder:
    input_channels: 1
    branch_channels: 16
    kernel_sizes: [1, 3, 5, 7, 9, 11]
    output_channels: 96
    use_projection: false
    gn_groups: 8
  ppg_encoder:
    input_channels: 1
    branch_channels: 16
    kernel_sizes: [1, 3, 5, 7, 9, 11]
    output_channels: 96
    use_projection: false
    gn_groups: 8
  conditional_model:
    cond_channels: 96
    joint_channels: 256
    base_channels: 64
    gn_groups: 8
  diffusion:
    num_steps: 200
    beta_start: 0.0001
    beta_end: 0.02

train:
  stage_name: joint
  batch_size: 16
  val_batch_size: 16
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  grad_clip: 1.0
  save_every_epochs: 50
  max_steps_per_epoch: 5000
